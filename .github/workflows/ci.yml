name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Fazer o Checkout do código
      uses: actions/checkout@v3

    - name: Login no Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build e Push do Backend (FastAPI)
      uses: docker/build-push-action@v4
      with:
        context: ./app/backend
        push: true
        # 'latest' garante que o ArgoCD sempre pegue a versão mais nova
        tags: ${{ secrets.DOCKER_USERNAME }}/taskflow-backend:latest 

    - name: Build e Push do Frontend (Vue.js)
      uses: docker/build-push-action@v4
      with:
        context: ./app/frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/taskflow-frontend:latest